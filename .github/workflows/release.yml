name: Release

# Triggered by the `release` dev script pushing a semver tag (e.g. 0.0.3).
on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      # Builds vendor/ with Nix and produces result/wp-cloud-files.zip.
      - run: nix build .#zip -L

      # Create the GitHub Release for this tag and attach the built zip.
      # plugin-update-checker on client sites downloads this asset to self-update.
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            result/wp-cloud-files.zip \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
